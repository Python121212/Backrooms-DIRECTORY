<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backrooms: DIRECTORY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-wrapper">
        
        <div id="login-overlay">
            <div class="login-box">
                <h1>Backrooms: DIRECTORY</h1>
                <p class="subtitle">VER 0.1.0 - ALPHA</p>
                <button id="btn-login" class="glitch-btn">Googleでログインして接続</button>
                <div id="loading-spinner" style="display: none;">接続中...</div>
            </div>
        </div>

        <div id="hud" style="display: none;">
            <div class="stats">
                <span id="player-name">GUEST</span>
                <span id="coords">LOC: X=0, Z=0</span>
            </div>
            <div id="vc-indicator">VC: READY</div>
        </div>

        <div id="admin-panel" style="display: none;">
            <div class="editor-header">
                <span>DIRECTORY EDITOR</span>
                <button id="btn-save-code">保存(SAVE)</button>
            </div>
            <textarea id="editor-textarea" spellcheck="false">// Level0.js のコードがここにロードされます</textarea>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
            "peerjs": "https://esm.sh/peerjs@1.5.2"
        }
    }
    </script>

    <script type="module" src="src/main.js"></script>

</body>
</html>
